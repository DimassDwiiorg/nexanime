<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexaNime — Streaming & Info Anime</title>
<link rel="icon" href="assets/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="aurora"></div>
  <div class="grid-overlay"></div>

  <div class="app">
    <nav class="navbar">
      <a href="#/home" class="brand">
        <img src="assets/logo.svg" alt="NexaNime logo">
        <span class="brand-name">NexaNime</span>
      </a>

      <div class="nav-links">
        <a href="#/home" data-nav="home">Home</a>
        <a href="#/popular" data-nav="popular">Populer</a>
        <a href="#/jadwal" data-nav="jadwal">Jadwal</a>
        <a href="#/genre" data-nav="genre">Genre</a>
        <a href="#/daftar" data-nav="daftar">Cari &amp; Filter</a>
      </div>

      <div class="nav-search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input type="text" id="navSearchInput" placeholder="Cari berdasarkan tag/judul, lalu Enter...">
      </div>

      <div class="nav-user">
        <div class="avatar" data-initials>?</div>
        <span data-username>Guest</span>
        <button class="icon-btn" id="logoutBtn" title="Keluar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>

      <button class="hamburger" id="hamburger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </nav>

    <main id="view"><!-- rendered by app.js --></main>

    <footer>
      NexaNime · Data disediakan lewat scraping publik (alqanime.net) oleh <a href="https://dimzz.my.id" style="color:var(--blue-300)">Dimass Dwii :P</a>.     </footer>
  </div>

  <div class="drawer" id="drawer">
    <div class="drawer-panel">
      <a href="#/home" data-nav="home">Home</a>
      <a href="#/popular" data-nav="popular">Populer</a>
      <a href="#/jadwal" data-nav="jadwal">Jadwal</a>
      <a href="#/genre" data-nav="genre">Genre</a>
      <a href="#/daftar" data-nav="daftar">Cari &amp; Filter</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
